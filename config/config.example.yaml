# Lumos 配置文件示例
# 复制此文件为 config.yaml 并根据需要修改

agent:
  id: "lumos"
  version: "0.1.0"
  description: "Lumos - AI Programming Assistant"

models:
  # 主模型（用于复杂推理）
  main:
    provider: "anthropic"  # 可选: anthropic, openai, ollama
    model_name: "claude-sonnet-4-5-20250929"
    api_base: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"  # 或直接填写密钥
    temperature: 0.7
    max_tokens: 8192

  # 辅助模型（用于简单任务，如 Explore 子 Agent）
  small:
    provider: "anthropic"
    model_name: "claude-3-5-haiku-20241022"
    api_base: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"
    temperature: 0.7
    max_tokens: 4096

# 模型路由配置（双模型路由）
routing:
  enabled: true
  # - Explore 类型子 Agent 使用 small 模型
  # - Plan、code-reviewer、debugger 等使用 main 模型
  # - 主 Agent 始终使用 main 模型

behavior:
  max_iterations: 10
  max_context_tokens: 100000
  compression_threshold: 0.92
  auto_confirm_dangerous: false

security:
  blocked_commands:
    - "rm -rf /"
    - "mkfs"
    - "dd if=/dev/zero"
    - ":(){:|:&};:"
    - "chmod -R 777 /"

  restricted_paths:
    - "/etc"
    - "/usr/bin"
    - "/usr/sbin"
    - "/Windows"
    - "C:\\Windows"

  max_file_size_mb: 10

tools:
  enabled:
    - "read_file"
    - "write_file"
    - "edit_file"
    - "bash"
    - "grep"
    - "glob"
    - "todowrite"
    - "task"

  file:
    max_file_size_mb: 10
    restricted_paths: ${security.restricted_paths}

  bash:
    timeout_seconds: 120
    working_dir: "."

cli:
  theme: "dark"
  show_thinking: true
  streaming_output: true
  markdown_rendering: true

media:
  output_dir: "~/.lumos/media"
  base64_threshold_kb: 100
  max_file_size_mb: 50
  cleanup_after_days: 7

logging:
  level: "INFO"
  file: "./logs/lumos.log"
  trajectory_dir: "./trajectories"

# 环境变量说明：
# ANTHROPIC_API_KEY - Anthropic API 密钥
# OPENAI_API_KEY - OpenAI API 密钥（如果使用 OpenAI）
# OLLAMA_BASE_URL - Ollama 服务地址（如果使用 Ollama）
